<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Your Space to Breathe</title>
    <style>
        :root {
            --accent-color: #8da9c4;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #1a252c;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Dynamic Background Slideshow */
        #bg-slider {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            transition: background-image 3s ease-in-out;
        }

        /* Dark overlay to make text readable */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 0 auto;
            padding-top: 40px;
            padding-bottom: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        header {
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 5px;}

        /* Audio Player Bar */
        .audio-bar {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .audio-btn {
            background: white;
            color: #333;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        input[type=range] {
            cursor: pointer;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        /* Breathing Circle Animation */
        .breath-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .circle {
            width: 90px;
            height: 90px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.8;
            transition: transform 4s linear;
        }

        .breathing-instruction {
            font-size: 1.2rem;
            font-weight: bold;
            height: 30px;
        }

        /* Controls */
        button.action-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        button.action-btn:hover { opacity: 0.8; }
        .hidden { display: none; }

        .affirmation {
            font-style: italic;
            font-size: 1.1rem;
            color: #444;
        }
    </style>
</head>
<body>

<div id="bg-slider"></div>
<div id="overlay"></div>

<div class="container">
    <header>
        <h1>The Clearing</h1>
        <p>Your space to breathe.</p>
    </header>

    <div class="audio-bar">
        <span style="font-size: 1.2rem;">🌊</span>
        <button class="audio-btn" id="play-pause-btn" onclick="toggleAudio()">▶</button>
        <span style="font-size: 0.9rem;">Ambient Waves</span>
        <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
    </div>

    <div class="card" id="breathing-app">
        <div class="breathing-instruction" id="breath-text">Press Start to Breathe</div>
        <div class="breath-container">
            <div class="circle" id="circle"></div>
        </div>
        <button class="action-btn" onclick="startBreathing()" id="breath-btn">Start Box Breathing</button>
    </div>

    <div class="card">
        <h3>5-4-3-2-1 Grounding</h3>
        <p id="grounding-text">Click to start a sensory grounding exercise.</p>
        <button class="action-btn" onclick="nextGrounding()">Guide Me</button>
    </div>

    <div class="card">
        <h3>A Soft Reminder</h3>
        <p class="affirmation" id="affirmation-display">"I am doing the best I can with the tools I have right now."</p>
        <button class="action-btn" onclick="newAffirmation()" style="background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color);">New Thought</button>
    </div>
</div>

<script>
    // --- 1. Background Image Slider ---
    const images = [
        "",
        "",
        "",
        ""
    ];
    let imgIndex = 0;
    const bgSlider = document.getElementById('bg-slider');
    
    function changeBackground() {
        bgSlider.style.backgroundImage = `url('${images[imgIndex]}')`;
        imgIndex = (imgIndex + 1) % images.length;
    }
    changeBackground(); // Initialize
    setInterval(changeBackground, 8000); // Change every 8 seconds

    // --- 2. Ambient Sound Generator (Brownian Noise / Waves) ---
    let audioCtx;
    let noiseNode;
    let gainNode;
    let isPlaying = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            
            // Generate Brownian Noise (sounds like distant waves/waterfall)
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; // Compensate for volume drop
            }

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;

            // Filter to make it sound soft like an ocean
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            gainNode = audioCtx.createGain();
            gainNode.gain.value = document.getElementById('volume-control').value;

            noiseNode.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }
    }

    function toggleAudio() {
        const btn = document.getElementById('play-pause-btn');
        if (!isPlaying) {
            initAudio();
            audioCtx.resume();
            btn.innerText = "⏸";
            isPlaying = true;
        } else {
            audioCtx.suspend();
            btn.innerText = "▶";
            isPlaying = false;
        }
    }

    function changeVolume(val) {
        if (gainNode) {
            gainNode.gain.value = val;
        }
    }

    // --- 3. Box Breathing Logic ---
    let breathInterval;
    function startBreathing() {
        const circle = document.getElementById('circle');
        const text = document.getElementById('breath-text');
        const btn = document.getElementById('breath-btn');
        btn.classList.add('hidden');
        
        let phase = 0;
        const routine = [
            { txt: "Inhale...", scale: "scale(1.8)", time: 4000 },
            { txt: "Hold...", scale: "scale(1.8)", time: 4000 },
            { txt: "Exhale...", scale: "scale(1.0)", time: 4000 },
            { txt: "Hold...", scale: "scale(1.0)", time: 4000 }
        ];

        function run() {
            const current = routine[phase];
            text.innerText = current.txt;
            circle.style.transform = current.scale;
            phase = (phase + 1) % routine.length;
        }

        run();
        breathInterval = setInterval(run, 4000);
    }

    // --- 4. Grounding Logic ---
    const groundingSteps = [
        "Acknowledge 5 things you see around you.",
        "Acknowledge 4 things you can touch.",
        "Acknowledge 3 things you hear.",
        "Acknowledge 2 things you can smell.",
        "Acknowledge 1 thing you can taste."
    ];
    let groundIdx = 0;
    function nextGrounding() {
        document.getElementById('grounding-text').innerText = groundingSteps[groundIdx];
        groundIdx = (groundIdx + 1) % groundingSteps.length;
    }

    // --- 5. Affirmations ---
    const affirmations = [
        "This feeling is temporary.",
        "I have survived every bad day so far.",
        "I am worthy of peace.",
        "My productivity does not define my worth.",
        "I am safe in this moment.",
        "It's okay to pause and just breathe."
    ];
    function newAffirmation() {
        const rand = Math.floor(Math.random() * affirmations.length);
        document.getElementById('affirmation-display').innerText = `"${affirmations[rand]}"`;
    }
</script>

</body>
</html>
