<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭物品管理系统 - 云端同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --background-color: #f4f6f8;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--background-color); 
            color: var(--text-primary); 
            line-height: 1.5; 
            padding: 30px 20px; 
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 600; font-size: 28px; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 5px; }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 30px; 
        }

        @media (max-width: 860px) { 
            .container { grid-template-columns: 1fr; } 
        }

        .panel { 
            background: var(--surface-color); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border-color);
            position: relative;
        }

        .panel h2 { font-size: 18px; margin-bottom: 20px; font-weight: 600; }

        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-primary); }
        
        input, select { 
            width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); 
            border-radius: 6px; font-size: 14px; transition: all 0.2s ease; background-color: #f9fafb;
        }
        
        input:focus, select:focus { 
            outline: none; border-color: var(--primary-color); background-color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        button { 
            background-color: var(--primary-color); color: white; border: none; 
            padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; 
            font-weight: 500; width: 100%; transition: background 0.2s; margin-top: 10px;
        }
        
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { color: var(--text-secondary); font-weight: 500; background-color: #f9fafb; }
        tr:last-child td { border-bottom: none; }
        
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; background-color: #e5edff; color: #1e40af; }

        .delete-btn { 
            background-color: transparent; color: #ef4444; border: 1px solid #ef4444;
            padding: 4px 10px; font-size: 12px; border-radius: 4px; width: auto; margin-top: 0;
        }
        .delete-btn:hover { background-color: #fef2f2; }
        
        .empty-state { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 14px; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8); display: flex; justify-content: center;
            align-items: center; font-size: 14px; color: var(--primary-color);
            border-radius: var(--radius); display: none; z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <h1>家庭物品管理系统 <span style="font-size: 12px; background: #10b981; color: white; padding: 2px 6px; border-radius: 10px; vertical-align: middle;">云同步版</span></h1>
        <p class="subtitle">掌控家庭资产，告别翻箱倒柜</p>
    </header>

    <div class="container">
        <div class="panel">
            <h2>入库登记</h2>
            <form id="itemForm">
                <div class="form-group">
                    <label for="itemName">物品名称</label>
                    <input type="text" id="itemName" required placeholder="例如：Switch 游戏机、房产证">
                </div>
                <div class="form-group">
                    <label for="itemCategory">所属分类</label>
                    <select id="itemCategory">
                        <option value="数码家电">数码家电</option>
                        <option value="家具家居">家具家居</option>
                        <option value="重要证件">重要证件</option>
                        <option value="服饰鞋包">服饰鞋包</option>
                        <option value="其他闲置">其他闲置</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemLocation">存放位置</label>
                    <input type="text" id="itemLocation" required placeholder="例如：电视柜左侧抽屉">
                </div>
                <div class="form-group">
                    <label for="itemDate">购入/建档日期</label>
                    <input type="date" id="itemDate">
                </div>
                <button type="submit" id="submitBtn">保存至云端</button>
            </form>
        </div>

        <div class="panel">
            <div class="loading-overlay" id="loadingOverlay">正在从云端加载数据...</div>
            <h2>物品清单</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>物品名称</th>
                            <th>分类</th>
                            <th>存放位置</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList">
                        </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state">当前云端没有记录，请在左侧添加。</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 初始化 Supabase 连接 
        // ==========================================
        const supabaseUrl = 'https://ipenghldeyxmkbqjngqe.supabase.co'; 
        const supabaseKey = 'sb_publishable_bg5MXHDR6xGhpdRmxvtOVg_TjFg2CrF';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // DOM 元素
        const form = document.getElementById('itemForm');
        const inventoryList = document.getElementById('inventoryList');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const submitBtn = document.getElementById('submitBtn');
        
        let items = []; // 本地数据缓存

        document.getElementById('itemDate').valueAsDate = new Date();

        // ==========================================
        // 2. 从云端获取数据 (SELECT)
        // ==========================================
        async function fetchItems() {
            loadingOverlay.style.display = 'flex'; // 显示加载动画
            
            // 从 inventory 表获取数据，按创建时间倒序排列
            const { data, error } = await supabaseClient
                .from('inventory')
                .select('*')
                .order('created_at', { ascending: false });

            loadingOverlay.style.display = 'none'; // 隐藏加载动画

            if (error) {
                console.error('获取数据失败:', error);
                alert('获取云端数据失败，请检查 URL 是否正确或 RLS 是否关闭');
                return;
            }

            items = data;
            renderItems();
        }

        // ==========================================
        // 3. 渲染表格数据
        // ==========================================
        function renderItems() {
            inventoryList.innerHTML = '';
            
            if (items.length === 0) {
                emptyState.style.display = 'block';
                document.querySelector('table').style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            document.querySelector('table').style.display = 'table';
            
            items.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 500; color: #111827;">${item.name}</td>
                    <td><span class="tag">${item.category}</span></td>
                    <td>${item.location}</td>
                    <td style="color: #6b7280;">${item.date || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteItem('${item.id}', ${index})">删除</button></td>
                `;
                inventoryList.appendChild(tr);
            });
        }

        // ==========================================
        // 4. 新增物品至云端 (INSERT)
        // ==========================================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = '正在保存...';
            
            const newItem = {
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                location: document.getElementById('itemLocation').value,
                date: document.getElementById('itemDate').value
            };
            
            // 写入 Supabase
            const { data, error } = await supabaseClient
                .from('inventory')
                .insert([newItem])
                .select(); // 插入后返回生成的数据（包含自动生成的 ID）

            submitBtn.disabled = false;
            submitBtn.innerText = '保存至云端';

            if (error) {
                console.error('保存失败:', error);
                alert('保存失败！请确认已在 Supabase 关闭该表的 RLS 安全策略。');
                return;
            }
            
            // 将云端返回的新数据塞入本地列表开头，重新渲染
            if(data && data.length > 0) {
                items.unshift(data[0]); 
                renderItems();
            }
            
            // 清空表单
            document.getElementById('itemName').value = '';
            document.getElementById('itemLocation').value = '';
            document.getElementById('itemName').focus();
        });

        // ==========================================
        // 5. 从云端删除物品 (DELETE)
        // ==========================================
        async function deleteItem(id, index) {
            if(confirm('确定要从云端彻底删除这条记录吗？')) {
                // 根据数据库里的真实 ID 删除
                const { error } = await supabaseClient
                    .from('inventory')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    console.error('删除失败:', error);
                    alert('删除失败！');
                    return;
                }

                // 本地同步删除并渲染
                items.splice(index, 1);
                renderItems();
            }
        }

        // 首次加载时，触发从云端拉取数据
        fetchItems();
    </script>
</body>
</html>
